services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tg-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./database/data:/var/lib/postgresql/data
    ports:
      - "18424:5432"
    networks:
      - tg-network

  redis:
    image: redis:7-alpine
    container_name: tg-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "18425:6379"
    networks:
      - tg-network

  backend:
    build: ./backend
    container_name: tg-backend
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENV=${ENV:-development}
    ports:
      - "18420:8000"
    depends_on:
      - db
      - redis
    networks:
      - tg-network

  worker:
    build: ./backend
    container_name: tg-worker
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info -Q browser-queue,mobile-queue,celery
    volumes:
      - ./backend/app:/app/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    networks:
      - tg-network

  gateway:
    build: ./gateway
    container_name: tg-gateway
    ports:
      - "18421:8080" # SOCKS5
      - "18422:8081" # Dashboard/API
    networks:
      - tg-network

  frontend:
    build: ./frontend
    container_name: tg-frontend
    ports:
      - "18423:80"
    depends_on:
      - backend
    networks:
      - tg-network

networks:
  tg-network:
    driver: bridge
