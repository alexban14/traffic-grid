# Encrypt this file with: ansible-vault encrypt ansible/group_vars/all/secrets.yml
# Then use: ansible-playbook --ask-vault-pass playbooks/setup-worker.yml

trafficgrid_db_user: "tg_admin"
trafficgrid_db_password: "CHANGE_ME"
trafficgrid_db_name: "trafficgrid"
trafficgrid_redis_password: "CHANGE_ME"

# Derived URLs (used by worker .env template)
trafficgrid_redis_url: "redis://:{{ trafficgrid_redis_password }}@{{ trafficgrid_control_plane_ip }}:18425/0"
trafficgrid_db_url: "postgresql://{{ trafficgrid_db_user }}:{{ trafficgrid_db_password }}@{{ trafficgrid_control_plane_ip }}:18424/{{ trafficgrid_db_name }}"
